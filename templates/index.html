<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background-color: #0d0d1a;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(60, 40, 100, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(20, 50, 80, 0.4) 0%, transparent 50%);
            color: #e8e0d0;
            font-family: 'Raleway', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px 80px;
        }

        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: 0.1; }
            to { opacity: 0.8; }
        }

        .content { position: relative; z-index: 1; width: 100%; max-width: 600px; }

        .hero {
            text-align: center;
            margin-bottom: 50px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .hero h1 em {
            font-style: italic;
            color: #f0c040;
        }

        .hero p {
            font-size: 14px;
            font-weight: 300;
            color: #8888aa;
            letter-spacing: 0.05em;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 32px;
            backdrop-filter: blur(10px);
            margin-bottom: 24px;
        }

        .field-label {
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #6688aa;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            color: #e8e0d0;
            font-family: 'Raleway', sans-serif;
            font-size: 18px;
            font-weight: 300;
            padding: 8px 0;
            outline: none;
            margin-bottom: 28px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-bottom-color: #f0c040;
        }

        input[type="text"]::placeholder { color: #444466; }

        .date-row {
            display: flex;
            gap: 12px;
        }

        .date-col { flex: 1; }

        select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e8e0d0;
            font-family: 'Raleway', sans-serif;
            font-size: 15px;
            padding: 10px 8px;
            outline: none;
            cursor: pointer;
            appearance: none;
            text-align: center;
        }

        select:focus { border-color: #f0c040; }

        button {
            width: 100%;
            margin-top: 28px;
            padding: 16px;
            background: #f0c040;
            color: #0d0d1a;
            border: none;
            border-radius: 10px;
            font-family: 'Raleway', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover { background: #ffd040; }
        button:active { transform: scale(0.99); }

        .spinner {
            display: none;
            width: 44px;
            height: 44px;
            border: 3px solid rgba(240,192,64,0.2);
            border-top-color: #f0c040;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .results {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 10px;
        }

        .result-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 28px;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card .tag {
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #f0c040;
            margin-bottom: 12px;
        }

        .result-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 14px;
            color: #f0f0f0;
        }

        .result-card p {
            font-size: 15px;
            font-weight: 300;
            line-height: 1.8;
            color: #aaaacc;
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="content">
    <div class="hero">
        <h1>Расшифруй своё<br><em>Предназначение</em></h1>
        <p>Введи своё имя и дату рождения, чтобы узнать тайны звёзд</p>
    </div>

    <form method="POST" onsubmit="document.getElementById('spinner').style.display='block'">
        <div class="card">
            <div class="field-label">Твоё имя</div>
            <input type="text" name="name" placeholder="например, Александра" required>

            <div class="field-label">Дата рождения</div>
            <div class="date-row">
                <div class="date-col">
                    <div class="field-label">День</div>
                    <select name="day">
                        {% for d in range(1, 32) %}
                        <option value="{{ d }}">{{ d }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="date-col">
                    <div class="field-label">Месяц</div>
                    <select name="month">
                        <option value="января">Январь</option>
                        <option value="февраля">Февраль</option>
                        <option value="марта">Март</option>
                        <option value="апреля">Апрель</option>
                        <option value="мая">Май</option>
                        <option value="июня">Июнь</option>
                        <option value="июля">Июль</option>
                        <option value="августа">Август</option>
                        <option value="сентября">Сентябрь</option>
                        <option value="октября">Октябрь</option>
                        <option value="ноября">Ноябрь</option>
                        <option value="декабря">Декабрь</option>
                    </select>
                </div>
                <div class="date-col">
                    <div class="field-label">Год</div>
                    <select name="year">
                        {% for y in range(2010, 1919, -1) %}
                        <option value="{{ y }}">{{ y }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button type="submit">✦ Вопросить звёзды ✦</button>
        </div>
    </form>

    <div class="spinner" id="spinner"></div>

    {% if name_result %}
    <div class="results">
        <div class="result-card">
            <div class="tag">Характеристика имени</div>
            <h2>Твоя личность</h2>
            <p>{{ name_result }}</p>
        </div>
        <div class="result-card">
            <div class="tag">Прогноз на ближайший месяц</div>
            <h2>Что тебя ожидает</h2>
            <p>{{ future_result }}</p>
        </div>
    </div>
    {% endif %}
</div>

<script>
    const stars = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2 + 0.5;
        s.style.cssText = `
            width: ${size}px; height: ${size}px;
            top: ${Math.random() * 100}%;
            left: ${Math.random() * 100}%;
            --dur: ${2 + Math.random() * 4}s;
            animation-delay: ${Math.random() * 4}s;
        `;
        stars.appendChild(s);
    }
</script>

</body>
</html>
