<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 100px;
        }
        h1 {
            margin-bottom: 20px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 250px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-left: 10px;
            cursor: pointer;
        }
        p {
            margin-top: 40px;
            font-size: 22px;
            max-width: 600px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Расшифровка имени</h1>
    <form method="POST">
        <input type="text" name="name" placeholder="Введи имя">
        <button type="submit">Отправить</button>
    </form>
    {% if greeting %}
        <p>{{ greeting }}</p>
    {% endif %}
</body>
</html>
